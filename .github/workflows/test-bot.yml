name: "Test Onboarding Bot"

on:
  issues:
    types: [opened]

jobs:
  test-welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: "Simplified Comment Step"
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `##  Testing Gitbun Bot \n @${context.actor}, this is a test of the onboarding automation!`
            })
